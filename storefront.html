<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--ink:#1c1c1c;--gray:#64646a;--muted:#a0a0a8;--pale:#d4d4d8;--bg:#fff;--warm:#f7f6f3;--warm2:#f0ede6;--border:#e8e6e1;--indigo:#4338ca;--indigo2:#4f46e5;--indigo-pale:#eef2ff;--indigo-mid:#c7d2fe;--green:#15803d}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
/* HEADER */
.sf-header{background:var(--sf-accent, var(--black));padding:52px 24px 0;text-align:center;position:relative;overflow:hidden}
.sf-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(99,102,241,.18) 0%,transparent 65%)}
.sf-header::after{content:'';position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(90deg,white 0,white 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,white 0,white 1px,transparent 1px,transparent 60px)}
.sf-inner{max-width:560px;margin:0 auto;position:relative;z-index:1}
.sf-avatar{width:76px;height:76px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--black);background:white;box-shadow:0 0 0 4px rgba(255,255,255,.12)}
.sf-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:white;margin-bottom:8px;letter-spacing:-.5px}
.sf-bio{font-size:14px;color:rgba(255,255,255,.5);line-height:1.65;max-width:340px;margin:0 auto 20px;font-weight:300}
.sf-socials{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sf-soc{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:50px;font-size:12px;transition:background .2s}
.sf-soc:hover{background:rgba(255,255,255,.15);color:white}
.sf-share-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:5px 14px;border-radius:50px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-bottom:20px}
.sf-share-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.sf-tab-row{background:rgba(255,255,255,.05);border-top:1px solid rgba(255,255,255,.08)}
.sf-tab{display:inline-block;padding:13px 28px;font-size:13px;color:rgba(255,255,255,.6);border-bottom:2px solid rgba(255,255,255,.5);font-weight:500}
/* MAIN */
.sf-main{max-width:1000px;margin:0 auto;padding:36px 24px 80px}
.sf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.sf-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:cardIn .35s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sf-card:nth-child(1){animation-delay:.04s}.sf-card:nth-child(2){animation-delay:.08s}.sf-card:nth-child(3){animation-delay:.12s}.sf-card:nth-child(4){animation-delay:.16s}.sf-card:nth-child(5){animation-delay:.2s}.sf-card:nth-child(6){animation-delay:.24s}
.sf-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.08)}
.sf-card-img{width:100%;height:180px;background:var(--warm2);display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden}
.sf-card-img img{width:100%;height:100%;object-fit:cover}
.sf-card-body{padding:13px 14px}
.sf-card-store{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--indigo2);margin-bottom:4px}
.sf-card-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:12px;color:var(--ink)}
.sf-card-actions{display:flex;gap:6px}
.btn-shop{flex:1;display:block;background:var(--black);color:white;border:none;padding:9px 10px;border-radius:50px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;transition:opacity .15s}
.btn-shop:hover{opacity:.8}
.btn-copy-link{background:none;border:1.5px solid var(--border);color:var(--muted);padding:9px 12px;border-radius:50px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-copy-link:hover{border-color:var(--ink);color:var(--ink)}
.sf-empty{text-align:center;padding:80px 24px}
.sf-empty-icon{font-size:48px;margin-bottom:16px}
.sf-empty h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:8px}
.sf-empty p{font-size:14px;color:var(--muted);line-height:1.6}
.sf-notfound{text-align:center;padding:120px 24px}
.sf-notfound h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;margin-bottom:12px}
.sf-notfound p{font-size:15px;color:var(--muted);margin-bottom:28px}
/* Loading skeleton */
.sf-loading{text-align:center;padding:80px 24px;color:var(--muted);font-size:14px}
footer{text-align:center;padding:24px;border-top:1px solid var(--border)}
footer a{font-size:12px;color:var(--muted);transition:color .2s}
footer a:hover{color:var(--black)}
@media(max-width:600px){.sf-grid{grid-template-columns:repeat(2,1fr);gap:10px}.sf-card-img{height:140px;font-size:34px}.sf-main{padding:24px 14px 60px}}
</style>

<body>
<div id="app"><div class="sf-loading">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://lyknsmgvqrxuhxwryzws.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5a25zbWd2cXJ4dWh4d3J5endzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA4ODksImV4cCI6MjA5Mzc0Njg4OX0.o1DVN9fEb7qfIi0Kw7zGFUpPuluaUvllGIXEY3wHTW4';
// ───────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Get handle from query param (Vercel route passes it as ?handle=xxx)
const handle = new URLSearchParams(window.location.search).get('handle')
            || window.location.pathname.replace(/^\/|\.html$/g, '') || '';

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── LOAD AND RENDER — wrapped in async IIFE so await works everywhere ──
(async function load() {
  if (!handle) {
    renderNotFound('');
    return;
  }

  // Check for collection filter
  const collectionSlug = new URLSearchParams(window.location.search).get('c');

  // Fetch profile + products in parallel
  const [{ data: profile, error: profileErr }, { data: allProducts }] = await Promise.all([
    sb.from('signups').select('name,bio,instagram,tiktok,handle,plan,brand_color,custom_domain').eq('handle', handle).single(),
    sb.from('products').select('*').eq('handle', handle).order('created_at', { ascending: false })
  ]);

  let products = allProducts || [];

  // Filter by collection if slug provided
  let activeCollection = null;
  if (collectionSlug) {
    const { data: coll } = await sb.from('collections')
      .select('*, collection_products(product_id)')
      .eq('handle', handle).eq('slug', collectionSlug).single();
    if (coll) {
      activeCollection = coll;
      const ids = coll.collection_products.map(cp => cp.product_id);
      products = products.filter(p => ids.includes(p.id));
    }
  }

  if (profileErr || !profile) {
    renderNotFound(handle);
    return;
  }

  render(profile, products, activeCollection);
})();

// ── RENDER STOREFRONT ──────────────────────────────────────────
function render(p, products, collection) {
  const initials = (p.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const storeUrl = window.location.href;

  // Apply brand colour if set
  const brandColor = p.brand_color || '#0a0a0a';
  document.documentElement.style.setProperty('--sf-accent', brandColor);

  document.getElementById('pageTitle').textContent = (p.name || 'Creator') + "'s Picks – LinkGlobe";
  document.getElementById('pageDesc').setAttribute('content', 'Shop ' + (p.name || 'Creator') + "'s favourite picks");
  document.getElementById('ogTitle').setAttribute('content', (p.name || 'Creator') + "'s Picks");

  const socials = [
    p.instagram ? `<a class="sf-soc" href="https://instagram.com/${esc(p.instagram)}" target="_blank">📷 @${esc(p.instagram)}</a>` : '',
    p.tiktok    ? `<a class="sf-soc" href="https://tiktok.com/@${esc(p.tiktok)}" target="_blank">🎵 @${esc(p.tiktok)}</a>`         : ''
  ].filter(Boolean).join('');

  const cards = products.length === 0
    ? `<div class="sf-empty">
        <div class="sf-empty-icon">🛍️</div>
        <h3>Coming soon</h3>
        <p>Products are being added. Check back soon!</p>
       </div>`
    : `<div class="sf-grid">
        ${products.map(prod => `
          <div class="sf-card" onclick="trackClick(${prod.id},'${esc(prod.store)}','${esc(prod.geo_link)}')">
            <div class="sf-card-img">
              ${prod.image
                ? `<img src="${esc(prod.image)}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:44px>${prod.emoji||'🛍️'}</span>'">`
                : `<span>${prod.emoji || '🛍️'}</span>`}
            </div>
            <div class="sf-card-body">
              <div class="sf-card-store">${esc(prod.store_label)}</div>
              <div class="sf-card-name">${esc(prod.name)}</div>
              <div class="sf-card-actions">
                <a class="btn-shop" href="${esc(prod.geo_link)}" target="_blank" onclick="event.stopPropagation();trackClick(${prod.id},'${esc(prod.store)}','${esc(prod.geo_link)}');return false;">Shop now →</a>
                <button class="btn-copy-link" onclick="event.stopPropagation();copyProd('${esc(prod.geo_link)}',this)">Copy</button>
              </div>
            </div>
          </div>`
        ).join('')}
       </div>`;

  document.getElementById('app').innerHTML = `
    <header class="sf-header">
      <div class="sf-inner">
        <div class="sf-avatar">${esc(initials)}</div>
        <h1 class="sf-name">${esc(p.name)}'s Picks</h1>
        ${p.bio ? `<p class="sf-bio">${esc(p.bio)}</p>` : ''}
        <div class="sf-socials">${socials}</div>
        <button class="sf-share-btn" onclick="shareStore('${esc(storeUrl)}')">🔗 Share my store</button>
        <div class="sf-tab-row"><span class="sf-tab">${collection ? '🗂 ' + esc(collection.name) : 'All picks'} (${products.length})</span></div>
      </div>
    </header>
    <main class="sf-main">${cards}</main>
    <footer>${p.plan === 'pro' ? '' : '<a href="https://linkglobe.co">🌏 Powered by LinkGlobe</a>'}</footer>`;
}

// ── NOT FOUND ──────────────────────────────────────────────────
function renderNotFound(h) {
  document.getElementById('app').innerHTML = `
    <div class="sf-notfound">
      <div style="font-size:52px;margin-bottom:20px">🌏</div>
      <h1>Store not found</h1>
      <p>${h ? `<strong>@${esc(h)}</strong> hasn't set up their store yet.` : 'No store handle provided.'}</p>
      <a href="/onboarding" style="display:inline-block;background:var(--black);color:white;padding:13px 32px;border-radius:50px;font-size:14px;font-weight:500;margin-top:16px">Create your store →</a>
    </div>
    <footer>${p.plan === 'pro' ? '' : '<a href="https://linkglobe.co">🌏 Powered by LinkGlobe</a>'}</footer>`;
}

// ── HELPERS ────────────────────────────────────────────────────
// ── CLICK TRACKING ──────────────────────────────────────────────
function parseUA() {
  const ua = navigator.userAgent;
  const device  = /Mobi|Android/i.test(ua) ? 'Mobile' : /Tablet|iPad/i.test(ua) ? 'Tablet' : 'Desktop';
  const os      = /iPhone|iPad|iPod/i.test(ua) ? 'iOS'
                : /Android/i.test(ua)          ? 'Android'
                : /Windows/i.test(ua)          ? 'Windows'
                : /Mac/i.test(ua)              ? 'macOS'
                : /Linux/i.test(ua)            ? 'Linux' : 'Other';
  const browser = /Edg\//i.test(ua)           ? 'Edge'
                : /OPR\//i.test(ua)            ? 'Opera'
                : /Chrome/i.test(ua)           ? 'Chrome'
                : /Safari/i.test(ua)           ? 'Safari'
                : /Firefox/i.test(ua)          ? 'Firefox' : 'Other';
  return { device, os, browser };
}

function getReferrer() {
  const ref = document.referrer;
  if (!ref) return 'Direct';
  try {
    const host = new URL(ref).hostname.replace('www.','');
    if (host.includes('instagram')) return 'Instagram';
    if (host.includes('tiktok'))    return 'TikTok';
    if (host.includes('youtube'))   return 'YouTube';
    if (host.includes('twitter') || host.includes('x.com')) return 'X / Twitter';
    if (host.includes('facebook'))  return 'Facebook';
    if (host.includes('pinterest')) return 'Pinterest';
    if (host.includes('google'))    return 'Google';
    if (host.includes('snapchat'))  return 'Snapchat';
    return host;
  } catch { return 'Direct'; }
}

async function trackClick(productId, store, geoLink) {
  // Open destination immediately — don't make users wait
  window.open(geoLink, '_blank');

  // Track asynchronously in background
  try {
    const { device, os, browser } = parseUA();
    const referrer = getReferrer();

    // Country from lightweight IP API (no key needed, CORS enabled)
    let country = 'Unknown';
    try {
      const geo = await fetch('https://api.country.is/', { signal: AbortSignal.timeout(3000) });
      if (geo.ok) { const d = await geo.json(); country = d.country || 'Unknown'; }
    } catch {}

    await sb.from('clicks').insert({
      handle,
      product_id:  productId,
      store,
      country,
      referrer,
      device_type: device,
      os,
      browser
    });
  } catch (e) { /* silent — never block the user */ }
}

function copyProd(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
  });
}

function shareStore(url) {
  if (navigator.share) navigator.share({ title: 'My LinkGlobe store', url });
  else navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
}
</script>
