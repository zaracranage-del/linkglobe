<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkGlobe Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --indigo: #4f46e5; --indigo-dark: #3730a3;
      --indigo-light: #e0e7ff; --indigo-pale: #eef2ff;
      --text: #0f0f1a; --muted: #6b7280; --bg: #f8f7ff;
      --white: #ffffff; --border: #e5e7f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .hdr {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      text-align: center; padding: 56px 24px 0; position: relative; overflow: hidden;
    }
    .hdr::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(255,255,255,0.12) 0%, transparent 65%); }
    .hdr::after { content: ''; position: absolute; inset: 0; opacity: 0.05; background-image: repeating-linear-gradient(90deg, white 0, white 1px, transparent 1px, transparent 72px); }
    .hdr-inner { max-width: 580px; margin: 0 auto; position: relative; z-index: 1; }

    /* Initials avatar instead of photo */
    .avatar-ini {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--indigo);
      background: white; box-shadow: 0 0 0 4px rgba(255,255,255,0.2);
    }

    .cname { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: white; margin-bottom: 8px; }
    .cbio { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.65; max-width: 380px; margin: 0 auto 20px; }
    .socials { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .soc { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; text-decoration: none; padding: 7px 14px; border-radius: 50px; font-size: 13px; transition: background 0.2s; }
    .soc:hover { background: rgba(255,255,255,0.25); }
    .hdr-tab-row { background: rgba(0,0,0,0.15); }
    .hdr-tab { padding: 13px 28px; font-size: 14px; color: white; border-bottom: 2px solid rgba(255,255,255,0.6); display: inline-block; font-weight: 500; }

    .main { max-width: 980px; margin: 0 auto; padding: 36px 24px 80px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }

    .card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: up 0.4s ease both; }
    .card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.card:nth-child(5){animation-delay:.25s}.card:nth-child(6){animation-delay:.3s}
    @keyframes up { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
    .card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(79,70,229,0.14); }
    .card-img { width: 100%; height: 190px; background: var(--indigo-pale); display: flex; align-items: center; justify-content: center; font-size: 50px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 13px 15px; }
    .card-store { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--indigo); margin-bottom: 4px; }
    .card-name { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 12px; }
    .btn-shop { display: block; width: 100%; background: var(--indigo); color: white; border: none; padding: 11px; border-radius: 50px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; text-align: center; transition: background 0.15s; }
    .btn-shop:hover { background: var(--indigo-dark); }

    .empty { text-align: center; padding: 80px 24px; }
    .empty-icon { font-size: 50px; margin-bottom: 16px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .empty p { color: var(--muted); font-size: 15px; line-height: 1.6; }

    .geo-toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--indigo); color: white; border-radius: 50px; padding: 10px 22px; font-size: 13px; white-space: nowrap; box-shadow: 0 4px 20px rgba(79,70,229,0.4); z-index: 100; animation: sup 0.35s ease; }
    .geo-toast.show { display: block; }
    @keyframes sup { from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

    .notfound { text-align: center; padding: 120px 24px; }
    .notfound h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 12px; }
    .notfound p { color: var(--muted); font-size: 16px; margin-bottom: 28px; }

    footer { text-align: center; padding: 28px; border-top: 1px solid var(--border); }
    footer a { font-size: 13px; color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card-img { height: 150px; font-size: 36px; }
      .main { padding: 24px 14px 60px; }
    }
  </style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:80px;color:var(--muted)">Loading...</div></div>
<div class="geo-toast" id="geoToast"></div>

<script>
  const handle = new URLSearchParams(window.location.search).get('handle') || '';
  const profile = JSON.parse(localStorage.getItem('lg_profile') || 'null');

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  if (!profile || (handle && profile.handle !== handle)) {
    document.getElementById('app').innerHTML = `
      <div class="notfound">
        <div style="font-size:56px;margin-bottom:20px">🌏</div>
        <h1>Store not found</h1>
        <p>The creator <strong>${esc(handle)}</strong> hasn't set up their store yet.</p>
        <a href="/onboarding.html" style="display:inline-block;background:var(--indigo);color:white;padding:14px 32px;border-radius:50px;text-decoration:none;font-size:15px;font-weight:500;margin-top:8px;">Create your store →</a>
      </div>
      <footer><a href="/index.html">🌏 Powered by LinkGlobe</a></footer>`;
  } else {
    render(profile);
    document.title = `${profile.name}'s Picks – LinkGlobe`;
    tryGeoBanner();
  }

  function render(p) {
    const products = p.products || [];
    const initials = (p.name || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

    const socials = [
      p.instagram ? `<a class="soc" href="https://instagram.com/${esc(p.instagram)}" target="_blank">📷 Instagram</a>` : '',
      p.tiktok    ? `<a class="soc" href="https://tiktok.com/@${esc(p.tiktok)}" target="_blank">🎵 TikTok</a>` : '',
      p.youtube   ? `<a class="soc" href="https://youtube.com/${esc(p.youtube)}" target="_blank">▶️ YouTube</a>` : '',
    ].filter(Boolean).join('');

    const cards = products.length === 0
      ? `<div class="empty"><div class="empty-icon">🛍️</div><h3>Coming soon</h3><p>Products are being added. Check back soon!</p></div>`
      : `<div class="grid">${products.map(prod => `
        <div class="card" onclick="window.open('${esc(prod.geoLink)}','_blank')">
          <div class="card-img">${prod.image?`<img src="${esc(prod.image)}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:50px>${prod.emoji||'🛍️'}</span>'">`:`<span>${prod.emoji||'🛍️'}</span>`}</div>
          <div class="card-body">
            <div class="card-store">${esc(prod.storeLabel)}</div>
            <div class="card-name">${esc(prod.name)}</div>
            <a class="btn-shop" href="${esc(prod.geoLink)}" target="_blank" onclick="event.stopPropagation()">Shop now →</a>
          </div>
        </div>`).join('')}</div>`;

    document.getElementById('app').innerHTML = `
      <header class="hdr">
        <div class="hdr-inner">
          <div class="avatar-ini">${esc(initials)}</div>
          <h1 class="cname">${esc(p.name)}'s Picks</h1>
          ${p.bio?`<p class="cbio">${esc(p.bio)}</p>`:''}
          ${socials?`<div class="socials">${socials}</div>`:'<div style="height:20px"></div>'}
          <div class="hdr-tab-row"><span class="hdr-tab">All products</span></div>
        </div>
      </header>
      <main class="main">${cards}</main>
      <footer><a href="/index.html">🌏 Powered by LinkGlobe</a></footer>`;
  }

  function tryGeoBanner() {
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => {
        if (d.country_name) {
          const t = document.getElementById('geoToast');
          t.textContent = `🌏 Showing links for ${d.country_name}`;
          t.classList.add('show');
          setTimeout(() => t.classList.remove('show'), 4000);
        }
      }).catch(() => {});
  }
</script>
</body>
</html>
