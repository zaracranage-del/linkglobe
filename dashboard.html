<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkGlobe - Dashboard</title>
  <style>/* Your existing CSS here */</style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🌏 LinkGlobe</div>
    <div><a href="/">Home</a></div>
  </nav>
  <div class="container">
    <h2>Create Smart Link</h2>
    <p class="subtitle">Enter US Amazon details; auto-redirects globally with your tags.</p>
    <div class="card">
      <label>Amazon ASIN (e.g., B08XYZ1234)</label>
      <input id="asin" placeholder="B08XYZ1234" required>
      <label>Your US Tag (tag=xyz-20)</label>
      <input id="tag" placeholder="yourusertag-20" required>
      <label>AU Tag (optional override)</label>
      <input id="auTag" placeholder="yourautag-21">
      <button onclick="generateLink()">Generate Link</button>
      <div id="result" class="result">
        <div class="result-box">
          <span id="resultUrl" class="result-url"></span>
          <button class="copy-btn" onclick="copyLink()">Copy</button>
        </div>
      </div>
    </div>
    <div class="stats">
      <!-- Vercel Analytics integration later -->
      <div class="stat">Total Clicks: 0</div>
      <div class="stat">AU Redirects: 0</div>
      <div class="stat">Conversion: 0%</div>
    </div>
  </div>
  <script>
    function generateLink() {
      const asin = document.getElementById('asin').value;
      const tag = document.getElementById('tag').value;
      const auTag = document.getElementById('auTag').value;
      const base = window.location.origin + '/api';
      let params = `?asin=${asin}&tag=${tag}`;
      if (auTag) params += `&au_tag=${auTag}`;
      const link = `${base}${params}`;
      document.getElementById('resultUrl').textContent = link;
      document.getElementById('result').style.display = 'block';
    }
    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('resultUrl').textContent);
      alert('Copied!');
    }
  </script>
</body>
</html>
