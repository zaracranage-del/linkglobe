<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in – LinkGlobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--ink:#1c1c1c;--gray:#64646a;--muted:#a0a0a8;--bg:#fff;--warm:#f7f6f3;--warm2:#f0ede6;--border:#e8e6e1;--border2:#d4d2cd;--indigo2:#4f46e5;--green:#15803d;--red:#dc2626}
html,body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px}
a{text-decoration:none;color:inherit}
.card{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;color:var(--black);margin-bottom:36px;letter-spacing:-.3px}
.logo-mark{width:30px;height:30px;background:white;border:1px solid rgba(0,0,0,.08);border-radius:9px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:15px}
h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--black);letter-spacing:-.5px;margin-bottom:6px;line-height:1.1}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5}
label{display:block;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:6px}
input[type=email]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--black);background:var(--bg);outline:none;transition:border-color .2s}
input[type=email]:focus{border-color:var(--black)}
input.err{border-color:var(--red)}
.err-msg{font-size:12px;color:var(--red);margin-top:5px;min-height:16px}
.btn{width:100%;padding:13px;background:var(--black);color:white;border:none;border-radius:50px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn.loading .spin{display:block}
.btn.loading .btn-txt{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
/* Success state */
.success{display:none;text-align:center;padding:10px 0}
.success-icon{font-size:48px;margin-bottom:18px}
.success h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin-bottom:8px;color:var(--black)}
.success p{font-size:14px;color:var(--muted);line-height:1.65}
.success .email-highlight{color:var(--black);font-weight:500}
/* Footer */
.card-footer{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);text-align:center;font-size:13px;color:var(--muted)}
.card-footer a{color:var(--black);font-weight:500;transition:opacity .15s}
.card-footer a:hover{opacity:.7}
/* Error banner */
.err-banner{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL      = 'https://lyknsmgvqrxuhxwryzws.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5a25zbWd2cXJ4dWh4d3J5endzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA4ODksImV4cCI6MjA5Mzc0Njg4OX0.o1DVN9fEb7qfIi0Kw7zGFUpPuluaUvllGIXEY3wHTW4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If user is already signed in, send them straight to dashboard
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/dashboard';
});

// Also listen for auth state changes — handles clicking the magic link
// (Supabase processes the token in the URL and fires this event)
sb.auth.onAuthStateChange((event, session) => {
  if (session) window.location.href = '/dashboard';
});

async function sendLink() {
  const emailInput = document.getElementById('email');
  const errMsg     = document.getElementById('errMsg');
  const errBanner  = document.getElementById('errBanner');
  const btn        = document.getElementById('sendBtn');
  const email      = emailInput.value.trim();

  // Validate
  errMsg.textContent = '';
  errBanner.style.display = 'none';
  if (!email) { errMsg.textContent = 'Please enter your email'; emailInput.classList.add('err'); return; }
  if (!email.includes('@')) { errMsg.textContent = 'Please enter a valid email'; emailInput.classList.add('err'); return; }
  emailInput.classList.remove('err');

  // Loading state
  btn.disabled = true;
  btn.classList.add('loading');

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: 'https://linkglobe.co/dashboard' }
  });

  btn.disabled = false;
  btn.classList.remove('loading');

  if (error) {
    errBanner.textContent = 'Could not send link: ' + error.message + '. Please try again.';
    errBanner.style.display = 'block';
    return;
  }

  // Show success state
  document.getElementById('sentEmail').textContent = email;
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('successWrap').style.display = 'block';
}
</script>
</body>
</html>
